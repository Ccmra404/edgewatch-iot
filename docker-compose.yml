services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    depends_on:
      - mosquitto
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

volumes:
  backend-data:
